
<!DOCTYPE html>
<html>

<center>
<h1 style="color:white;"> Thyroid Disease Detection</h1>
<img src="https://storage.pressadvantage.com/uploads/organization/3445/Thyriod_Health_logo.jpg">
<h6 style="color:white;"></h6>
<body style="background-color:black;">

<h3 style="color:white;"> Enter the below fields and our model will predict whether you have thyroidal disease.</h3>    

<form action = "{{ url_for('predict')}}" method = "POST">
    
    <label for="fname" style="color:white;">Age in range 2 to 96:</label><br>
    <input type="number" name="fti" style="font-size:16pt" required="required"/><br><br>

    <label for="fname" style="color:white;">Sex 0 for male and 1 for female:</label><br>
    <input type="number" name="tsh" style="font-size:16pt" required="required"  step="any"/><br><br>

    <label for="fname" style="color:white;">T3 value in range 1 to 12:</label><br>
    <input type="number" name="tt4" style="font-size:16pt" required="required"/><br><br>
    
    <label for="fname" style="color:white;">TT4 in range 3 to 431:</label><br>
    <input type="number" name="t4u" style="font-size:16pt" required="required" step="any"/><br><br>

    <label for="fname" style="color:white;">T4U in range 1 to 3:</label><br>
    <input type="number" name="t4u" style="font-size:16pt" required="required" step="any"/><br><br>

    <label for="fname" style="color:white;">FTI 3 to 396:</label><br>
    <input type="number" name="t4u" style="font-size:16pt" required="required" step="any"/><br><br>

    <label for="fname" style="color:white;">referral_source_STMW 1 or 0:</label><br>
    <input type="number" name="t4u" style="font-size:16pt" required="required" step="any"/><br><br>

    <label for="fname" style="color:white;">referral_source_SVHC 1 or 0:</label><br>
    <input type="number" name="t4u" style="font-size:16pt" required="required" step="any"/><br><br>

    <label for="fname" style="color:white;">referral_source_SVHD 1 or 0:</label><br>
    <input type="number" name="t4u" style="font-size:16pt" required="required" step="any"/><br><br>

    <label for="fname" style="color:white;">referral_source_SVI 1 or 0:</label><br>
    <input type="number" name="t4u" style="font-size:16pt" required="required" step="any"/><br><br>

    <label for="fname" style="color:white;">referral_source_other 1 or 0:</label><br>
    <input type="number" name="t4u" style="font-size:16pt" required="required" step="any"/><br><br>

    <button type="submit" class="btn btn-primary btn-block btn-Large">Predict</button>

</form>
<br>
<h3 style="color:white;">
{{predict}}
</h3>
</center>

</body>
</html>
